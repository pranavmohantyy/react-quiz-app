<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>React Quiz App</title>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.development.js"></script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.development.js"></script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>\n</head>\n<body>\n    <div id="root"></div>\n    <script type="text/babel">\n        function QuestionCard({ question, options, correctAnswer, onAnswer }) {\n            const [selected, setSelected] = React.useState(null);\n            const handleClick = (index) => {\n                setSelected(index);\n                onAnswer(index === correctAnswer);\n            };\n            return (\n                <div>\n                    <h2>{question}</h2>\n                    {options.map((option, index) => (\n                        <button key={index} onClick={() => handleClick(index)} style={{ backgroundColor: selected === index ? (index === correctAnswer ? 'green' : 'red') : '' }}>{option}</button>\n                    ))}\n                </div>\n            );\n        }\n        // Main component and other logic will go here\n    </script>\n</body>\n</html>
