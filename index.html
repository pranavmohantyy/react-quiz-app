<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>React Quiz App</title>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.development.js"></script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.development.js"></script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>\n</head>\n<body>\n    <div id="root"></div>\n    <script type="text/babel">\n        const questions = [\n            {"category":"JavaScript","question":"What is the correct syntax to output 'Hello World' in JavaScript?","options":["console.log('Hello World');","print('Hello World');","echo 'Hello World';","write('Hello World');"],"correctAnswer":0},\n            {"category":"JavaScript","question":"Which of the following is a JavaScript data type?","options":["undefined","int","float","char"],"correctAnswer":0},\n            {"category":"JavaScript","question":"What is the correct way to create a function in JavaScript?","options":["function myFunction() {}","create myFunction() {}","function:myFunction() {}","myFunction() = function() {}"],"correctAnswer":0}\n        ];\n\n        function Quiz() {\n            const [currentQuestionIndex, setCurrentQuestionIndex] = React.useState(0);\n            const [score, setScore] = React.useState(0);\n            const [selectedAnswers, setSelectedAnswers] = React.useState([]);\n\n            const handleAnswerSelect = (index) => {\n                setSelectedAnswers([...selectedAnswers, index]);\n                if (index === questions[currentQuestionIndex].correctAnswer) {\n                    setScore(score + 1);\n                }\n                setCurrentQuestionIndex(currentQuestionIndex + 1);\n            };\n\n            if (currentQuestionIndex >= questions.length) {\n                return <div>Your score: {score}</div>;\n            }\n\n            const question = questions[currentQuestionIndex];\n            return (\n                <div>\n                    <h2>{question.question}</h2>\n                    {question.options.map((option, index) => (\n                        <button key={index} onClick={() => handleAnswerSelect(index)}>{option}</button>\n                    ))}\n                </div>\n            );\n        }\n\n        ReactDOM.render(<Quiz />, document.getElementById('root'));\n    </script>\n</body>\n</html>
